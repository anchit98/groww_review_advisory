# Render Blueprint — Groww Review Advisory API
# Docs: https://docs/DEPLOYMENT_PLAN.md
#
# After connect: set CORS_ORIGINS to your Vercel production URL in the Render dashboard.

services:
  - type: web
    name: groww-review-advisory-api
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt && python scripts/ci/verify_history_data.py
    startCommand: uvicorn review_advisory_api.main:app --host 0.0.0.0 --port $PORT --app-dir backend
    healthCheckPath: /health
    envVars:
      - key: REVIEW_ADVISORY_REPO_ROOT
        value: /opt/render/project/src
      - key: REVIEW_ADVISORY_HISTORY_DIR
        value: /opt/render/project/src/data/history
      - key: CORS_ORIGINS
        sync: false
        # Set in dashboard, e.g.:
        # https://your-app.vercel.app,http://localhost:5173
